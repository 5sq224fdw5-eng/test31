<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📋 crew31</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FFF8F5;--surface:#FFFFFF;--surface2:#FFF0EB;--border:#FDDDD4;
  --text:#2D1B14;--text2:#8C6458;--text3:#C4A098;
  --accent:#FF7F6E;--accent2:#FF9F7A;--peach:#FFCFC7;--cream:#FFF4F0;
  --green:#5DB88A;--red:#FF5C5C;--gold:#FFB347;--blue:#5B9BD5;
  --shadow:0 2px 16px rgba(255,127,110,0.1);--shadow2:0 6px 32px rgba(255,127,110,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 10% 0%,rgba(255,200,180,0.3),transparent 50%),radial-gradient(ellipse at 90% 100%,rgba(255,180,160,0.2),transparent 50%);
  background-attachment:fixed;}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'Noto Sans KR',sans-serif;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;background:var(--bg);padding:0;}
.login-profile-area{width:100%;display:flex;flex-direction:column;align-items:center;padding:52px 24px 32px;background:linear-gradient(180deg,rgba(255,200,180,0.35) 0%,rgba(255,248,245,0) 100%);}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;box-shadow:0 8px 24px rgba(255,127,110,0.3);}
.login-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,#FF7F6E,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:0;}
.login-card{width:100%;background:white;border-radius:0;box-shadow:none;border:none;border-top:1px solid var(--border);margin-top:0;flex:1;}
.login-sec{padding:20px 20px 16px;}
.login-sec+.login-sec{border-top:8px solid var(--bg);}
.login-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;}
.fi{width:100%;padding:12px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);outline:none;transition:all 0.2s;box-sizing:border-box;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,127,110,0.1);}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:800;margin-top:10px;transition:all 0.15s;letter-spacing:-0.3px;}
.login-btn.member{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;box-shadow:0 4px 16px rgba(255,127,110,0.3);}
.login-btn.admin{background:linear-gradient(135deg,#FFB347,#FF9F7A);color:white;}
.login-btn:active{transform:scale(0.97);}
.hdr{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,200,180,0.4);padding:10px 16px;position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,#FF7F6E,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-user{font-size:11px;color:var(--text3);}
.hdr-user b{color:var(--text2);font-weight:700;}
.btn-out{background:var(--peach);border:none;color:var(--accent);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.nav{display:flex;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,200,180,0.4);overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:none;padding:10px 14px;font-size:13px;font-weight:700;color:var(--text3);background:none;border:none;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all 0.15s;}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.gtabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.gtabs::-webkit-scrollbar{display:none;}
.gtab{flex:none;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;border:2px solid var(--border);background:white;color:var(--text3);transition:all 0.15s;cursor:pointer;white-space:nowrap;}
.gtab.active{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border-color:transparent;box-shadow:0 4px 14px rgba(255,127,110,0.35);}
.gtab:not(.active):hover{border-color:var(--accent);color:var(--accent);}
.page{display:none;padding-bottom:80px;}
.page.active{display:block;}
.card{background:rgba(255,255,255,0.92);border-radius:20px;box-shadow:var(--shadow);margin:0 16px 12px;overflow:hidden;border:1px solid rgba(255,210,200,0.5);}
.stitle{font-size:12px;font-weight:800;color:var(--accent);padding:14px 16px 6px;display:flex;align-items:center;gap:6px;}
.stitle::before{content:'';display:inline-block;width:3px;height:12px;background:linear-gradient(180deg,#FF9F7A,#FF7F6E);border-radius:2px;}
.vcard{background:rgba(255,255,255,0.92);border-radius:20px;margin:0 16px 12px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,210,200,0.5);}
.vcard-head{padding:14px 16px 10px;}
.vcard-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.vcard-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vcard-deadline.urgent{color:var(--red);}
.vcard-opts{padding:0 16px 10px;}
.vopt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.vopt:last-child{margin-bottom:0;}
.vopt.selected{border-color:var(--accent);background:rgba(255,127,110,0.06);}
.vopt.closed{cursor:default;}
.vbar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,127,110,0.08);transition:width 0.4s;z-index:0;border-radius:12px;pointer-events:none;}
.vopt-label{flex:1;font-size:14px;font-weight:600;position:relative;z-index:1;}
.vopt-cnt{font-size:12px;font-weight:700;color:var(--text2);position:relative;z-index:1;}
.vopt-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;position:relative;z-index:1;}
.vopt.selected .vopt-chk{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border-color:transparent;color:white;}
.voted-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(93,184,138,0.12);color:var(--green);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
.closed-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(196,160,152,0.15);color:var(--text3);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
.link-list{padding:0 16px 14px;}
.link-list-title{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:8px;padding-top:10px;border-top:1px solid var(--border);}
.link-item{padding:7px 0;border-bottom:1px solid rgba(255,220,210,0.5);}
.link-item:last-child{border-bottom:none;}
.link-num-name{font-size:13px;font-weight:700;}
.link-url{font-size:12px;color:var(--blue);word-break:break-all;}
.link-url a{color:var(--blue);text-decoration:none;}
.link-form{padding:10px 16px 14px;border-top:1px solid var(--border);}
.vadmin{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap;}
.vbtn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;border:none;transition:all 0.15s;}
.vbtn.edit{background:rgba(255,179,71,0.15);color:var(--gold);}
.vbtn.copy{background:rgba(91,155,213,0.15);color:#4A7EC0;}
.vbtn.del{background:rgba(255,92,92,0.12);color:var(--red);}
.vbtn.close{background:rgba(196,160,152,0.15);color:var(--text2);}
.vbtn.open{background:rgba(93,184,138,0.15);color:var(--green);}
.vbtn.reset{background:rgba(255,127,110,0.12);color:var(--accent);}
.vbtn:active{transform:scale(0.95);}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.cal-month{font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;}
.cal-nav{width:32px;height:32px;background:var(--surface2);border:none;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px 10px;gap:2px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;}
.cal-dow:first-child{color:var(--red);}
.cal-dow:last-child{color:var(--blue);}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;position:relative;transition:background 0.1s;}
.cal-day:hover{background:var(--surface2);}
.cal-day.today{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;box-shadow:0 2px 8px rgba(255,127,110,0.3);}
.cal-day.selected{background:var(--peach);color:var(--accent);}
.cal-day.has-data::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-day.today.has-data::after{background:white;}
.cal-day.sun{color:var(--red);}
.cal-day.sat{color:var(--blue);}
.cal-day.other{color:var(--text3);}
.btn-pri{padding:12px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;transition:all 0.15s;box-shadow:0 3px 12px rgba(255,127,110,0.2);}
.btn-pri:active{transform:scale(0.97);}
.btn-sec{padding:12px;background:var(--surface2);color:var(--text);border:none;border-radius:14px;font-size:14px;font-weight:700;}
.btn-sm{padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700;border:none;}
.btn-sm.pri{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;}
.btn-sm.sec{background:var(--surface2);color:var(--text2);}
.btn-sm:active{transform:scale(0.95);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.overlay.active{display:flex;}
.modal{background:rgba(255,255,255,0.97);border-radius:28px 28px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;margin-bottom:16px;}
.fl{margin-bottom:12px;}
.fl label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;}
.opt-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.opt-input{flex:1;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none;}
.opt-input:focus{border-color:var(--accent);}
.opt-del{width:32px;height:32px;background:rgba(255,92,92,0.1);border:none;border-radius:8px;color:var(--red);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-add{width:100%;padding:10px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--text2);margin-top:4px;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.btn-row .btn-pri,.btn-row .btn-sec{flex:1;}
.set-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--border);}
.set-name{flex:1;font-size:14px;font-weight:600;}
.set-del{background:rgba(255,92,92,0.1);border:none;border-radius:8px;color:var(--red);padding:6px 12px;font-size:12px;font-weight:700;}
.stat-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-name{flex:1;font-size:13px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge.g{background:rgba(93,184,138,0.12);color:var(--green);}
.badge.r{background:rgba(255,92,92,0.1);color:var(--red);}
.badge.y{background:rgba(255,179,71,0.15);color:#B8840A;}
.badge.b{background:rgba(91,155,213,0.12);color:#3A6EA8;}
.badge.n{background:var(--surface2);color:var(--text3);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}
.stat-box{background:var(--surface2);border-radius:12px;padding:12px;}
.stat-box-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;}
.stat-box-val{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--text);}
.stat-box-sub{font-size:11px;color:var(--text3);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;padding:11px 24px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(255,127,110,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:32px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.loading{text-align:center;padding:32px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

<div class="toast" id="toast"></div>

<!-- LOGIN -->

<div id="loginPage">
  <div class="login-wrap">
    <!-- 프로필 영역 -->
    <div class="login-profile-area">
      <div class="login-logo">📋</div>
      <div class="login-title">crew31</div>
      <div class="login-sub">(주) 떠리원 사무실</div>
      <a href="https://5sq224fdw5-eng.github.io/game31/game.html" target="_blank"
        style="margin-top:16px;display:flex;align-items:center;gap:6px;background:rgba(108,53,222,0.12);border:1.5px solid rgba(108,53,222,0.2);color:#6C35DE;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;text-decoration:none;">

        <div class="login-label">🔑 인사팀으로 시작</div>
        <input class="fi" id="loginPw" type="password" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin('admin')">
        <button class="login-btn admin" onclick="doLogin('admin')">인사팀 입장</button>
      </div>

<!-- APP -->

  <div class="hdr">

      <div style="display:flex;align-items:center;gap:10px">

  <!-- LEAVE TAB -->

    </div>
    <div id="calDetail"></div>

  <!-- STATUS (admin) -->

    <div class="gtabs" id="statusGroupTabs"></div>
    <div id="statusContent"><div class="loading"><div class="spinner"></div></div></div>

  <!-- NOTICE -->

  <div class="page" id="pageNotice">

      <button id="nTab_main" onclick="switchNoticeTab('main')" style="flex:1;padding:12px;font-size:13px;font-weight:800;border:none;border-bottom:2.5px solid var(--accent);color:var(--accent);background:none;cursor:pointer;">📌 메인공지</button>
      <button id="nTab_list" onclick="switchNoticeTab('list')" style="flex:1;padding:12px;font-size:13px;font-weight:700;border:none;border-bottom:2.5px solid transparent;color:var(--text3);background:none;cursor:pointer;">📋 전체공지</button>

  <!-- NOTICE DETAIL -->

  <div class="overlay" id="noticeDetailOverlay">
    <div class="modal">

<script>
const DB='https://gacha-31-default-rtdb.firebaseio.com/test31';
const GAME_DB='https://gacha-31-default-rtdb.firebaseio.com';
async function dbGet(p){try{const r=await fetch(`${DB}/${p}.json`);return await r.json();}catch{return null;}}
async function dbSet(p,d){try{await fetch(`${DB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}catch{}}
async function dbPush(p,d){try{const r=await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});return await r.json();}catch{return null;}}
async function dbDel(p){try{await fetch(`${DB}/${p}.json`,{method:'DELETE'});}catch{}}
async function gameGet(p){try{const r=await fetch(`${GAME_DB}/${p}.json`);return await r.json();}catch{return null;}}
async function gameSet(p,d){try{await fetch(`${GAME_DB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}catch{}}
async function gamePush(p,d){try{const r=await fetch(`${GAME_DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});return await r.json();}catch{return null;}}

const VOTE_TYPES=['출근','연차','2인1조','투피드','재능기부','열정페이'];
function getKSTDate(){const d=new Date();d.setHours(d.getHours()+9);return d.toISOString().slice(0,10);}
const todayStr=getKSTDate();
let CU=null,groups={},members={},activeGroup='',activeStatusGroup='all',voteSettingsGroup='',calY,calM,calSel;

// ── LOGIN ──
(function(){const s=localStorage.getItem('crew31User');if(s){try{CU=JSON.parse(s);window.addEventListener('DOMContentLoaded',enterApp);}catch{localStorage.removeItem('crew31User');}}})();

async function doLogin(role){
  if(role==='admin'){
    if(document.getElementById('loginPw').value!=='admin1234'){showToast('비밀번호 오류');return;}
    CU={name:'관리자',role:'admin',key:null};
  }else{
    const name=document.getElementById('loginName').value.trim();
    if(!name){showToast('이름을 입력하세요');return;}
    const ms=await dbGet('members');members=ms||{};
    const m=Object.entries(members).find(([k,v])=>v.name===name);
    if(!m){showToast('등록되지 않은 이름입니다');return;}
    CU={name:m[1].name,role:'member',key:m[0]};
  }
  localStorage.setItem('crew31User',JSON.stringify(CU));
  enterApp();
}
function logout(){CU=null;localStorage.removeItem('crew31User');document.getElementById('loginPage').style.display='';document.getElementById('app').style.display='none';}

async function enterApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='';
  document.getElementById('hName').textContent=CU.name;
  document.getElementById('hRole').textContent=CU.role==='admin'?'인사팀':'사원';
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=CU.role==='admin'?'':'none');

  const nwa=document.getElementById('noticeWriteArea');
  if(nwa)nwa.style.display=CU.role==='admin'?'block':'none';
  calY=new Date().getFullYear();calM=new Date().getMonth();calSel=todayStr;
  await loadGroups();
  goTab('notice');
}

// ── GROUPS ──
async function loadGroups(){
  const g=await dbGet('groups');
  if(!g||Object.keys(g).length===0){
    const def={g1:{name:'좋아요',color:'#FF7F6E'},g2:{name:'댓글',color:'#FFB347'},g3:{name:'시크릿',color:'#5DB88A'}};
    await dbSet('groups',def);groups=def;
  }else groups=g;
  // 첫 번째 그룹 자동 선택
  if(!activeGroup||!groups[activeGroup])activeGroup=Object.keys(groups)[0]||'';
  renderAllGroupTabs();

function renderAllGroupTabs(){
  renderGroupTabsFor('statusGroupTabs',activeStatusGroup,'setStatusGroup');
  renderVoteGroupTabs();
}

function renderGroupTabsFor(containerId,activeGid,fn){
  const el=document.getElementById(containerId);if(!el)return;
  const isStatus=!!fn; // fn 있으면 현황 탭 (전체 포함)
  let html='';
  if(isStatus){
    html=`<button class="gtab ${activeGid==='all'?'active':''}" onclick="${fn}('all',this)">전체</button>`;
    html+=Object.entries(groups).map(([id,g])=>`<button class="gtab ${activeGid===id?'active':''}" data-gid="${id}" onclick="${fn}('${id}',this)">${escH(g.name)}</button>`).join('');
  }else{
    html=Object.entries(groups).map(([id,g])=>`<button class="gtab ${activeGid===id?'active':''}" data-gid="${id}" onclick="checkGroupLock('${id}',this)">${escH(g.name)}${g.lock?'🔒':''}</button>`).join('');
  }
  el.innerHTML=html;
}

function renderVoteGroupTabs(){
  const el=document.getElementById('voteGroupTabs');if(!el)return;
  el.innerHTML=Object.entries(groups).map(([id,g],i)=>`<button class="gtab ${(voteSettingsGroup===id||(i===0&&!voteSettingsGroup))?'active':''}" onclick="setVoteSettingsGroup('${id}',this)" style="flex:none">${escH(g.name)}</button>`).join('');
  if(!voteSettingsGroup&&Object.keys(groups).length>0)voteSettingsGroup=Object.keys(groups)[0];
}

function setHomeGroup(gid,btn){activeGroup=gid;document.querySelectorAll('#homeGroupTabs .gtab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');else{const b=document.querySelector(`#homeGroupTabs .gtab[data-gid="${gid}"]`);if(b)b.classList.add('active');}loadHome();}
function setStatusGroup(gid,btn){activeStatusGroup=gid;document.querySelectorAll('#statusGroupTabs .gtab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadStatus();}
function setVoteSettingsGroup(id,btn){voteSettingsGroup=id;document.querySelectorAll('#voteGroupTabs .gtab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadVoteManageList();}

// ── HOME ──
let _cachedHomeData={votes:null,links:null};

// 카드만 다시 그리기 (Firebase 재요청 없음)
function renderVoteCards(){
  const el=document.getElementById('homeContent');
  if(!el||!_cachedHomeData.votes)return;
  renderFeedHTML(el,_cachedHomeData.votes,_cachedHomeData.links);
}

async function loadHome(){
  const el=document.getElementById('homeContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const [votes,links]=await Promise.all([dbGet('votes'),dbGet('links')]);
  _cachedHomeData={votes,links};
  renderFeedHTML(el,votes,links);
}

function renderFeedHTML(el,votes,links){
  if(!votes){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>투표가 없습니다</div>';return;}

  // 제목 기준으로 그룹핑 (같은 날 투표들을 하나의 피드 카드로)
  // 날짜+제목 패턴으로 묶기: "5월 14일 출근 투표" 같은 제목이 그룹별로 따로 있을 수 있음
  // → 제목이 같은 것끼리 묶고, 다르면 별도 카드
  const allVotes=Object.entries(votes)
    .filter(([k,v])=>!v.deleted)
    .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));

  if(allVotes.length===0){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>투표가 없습니다</div>';return;}

  // 제목으로 그룹핑
  const byTitle={};
  allVotes.forEach(([vid,v])=>{
    const t=v.title||'';
    if(!byTitle[t])byTitle[t]=[];
    byTitle[t].push([vid,v]);
  });

  let html='<div style="padding:12px 0 80px">';

  Object.entries(byTitle).forEach(([title,vlist])=>{
    // 대표 마감시간
    const deadline=new Date(vlist[0][1].deadline);
    const isClosed=vlist.every(([vid,v])=>v.closed||new Date(v.deadline)<=new Date());
    const diffH=Math.floor((deadline-new Date())/3600000);
    const ddStr=deadline.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const totalParticipants=vlist.reduce((s,[vid,v])=>s+(v.responses?Object.keys(v.responses).length:0),0);

    // 내가 이미 투표한 그룹 확인
    const myVotedGroups=vlist.filter(([vid,v])=>{
      const _ov=_optimisticVotes[vid];
      const mv=(_ov!==undefined)?(_ov===-1?null:_ov):(CU?.key&&v.responses?v.responses[CU.key]??null:null);
      return mv!==null;
    });

    // 피드 카드
    html+=`<div style="background:white;border-radius:20px;margin:0 14px 16px;box-shadow:0 2px 20px rgba(255,127,110,0.12);border:1px solid rgba(255,210,200,0.5);overflow:hidden">`;

    // 카드 헤더
    html+=`<div style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,220,210,0.6)">`;
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">`;
    html+=`<div style="display:flex;align-items:center;gap:8px">`;
    html+=`<div style="width:36px;height:36px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px">📋</div>`;
    html+=`<div><div style="font-size:15px;font-weight:800;color:#2D1B14">${escH(title)}</div>`;
    html+=`<div style="font-size:11px;color:#C4A098;margin-top:1px">⏰ ${ddStr} 마감 · ${totalParticipants}명 참여</div></div>`;
    html+=`</div>`;
    if(isClosed){
      html+=`<span style="background:rgba(196,160,152,0.15);color:#C4A098;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">종료</span>`;
    }else if(!isClosed&&diffH<2){
      html+=`<span style="background:rgba(255,92,92,0.1);color:#FF5C5C;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">⚡ 마감임박</span>`;
    }
    html+=`</div></div>`;

    // 그룹 선택 버튼들
    html+=`<div style="padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap">`;
    vlist.forEach(([vid,v])=>{
      const gColor=groups[v.groupId]?.color||'#FF7F6E';
      const gName=groups[v.groupId]?.name||'';
      const gLock=groups[v.groupId]?.lock;
      const _ov=_optimisticVotes[vid];
      const myVote=(_ov!==undefined)?(_ov===-1?null:_ov):(CU?.key&&v.responses?v.responses[CU.key]??null:null);
      const voted=myVote!==null;
      const isExpanded=_expandedFeedGroup===vid;
      const voterCnt=v.responses?Object.keys(v.responses).length:0;

      html+=`<button onclick="toggleFeedGroup('${vid}')" style="
        display:flex;align-items:center;gap:6px;
        padding:8px 14px;border-radius:16px;border:2px solid ${voted?gColor:isExpanded?gColor:'rgba(200,180,175,0.4)'};
        background:${voted?gColor+'18':isExpanded?gColor+'12':'white'};
        color:${voted||isExpanded?gColor:'#8C6458'};
        font-size:13px;font-weight:800;cursor:pointer;transition:all 0.15s;
        ${gLock&&CU?.role!=='admin'&&!sessionStorage.getItem('unlockedGroup_'+v.groupId)?'opacity:0.7':''}
      ">`;
      if(voted)html+=`<span style="font-size:14px">✅</span>`;
      else if(gLock&&CU?.role!=='admin'&&!sessionStorage.getItem('unlockedGroup_'+v.groupId))html+=`<span style="font-size:12px">🔒</span>`;
      html+=`${escH(gName)}`;
      if(voterCnt>0)html+=`<span style="font-size:11px;opacity:0.8">${voterCnt}</span>`;
      html+=`</button>`;
    });
    html+=`</div>`;

    // 펼쳐진 그룹 투표 옵션
    vlist.forEach(([vid,v])=>{
      if(_expandedFeedGroup!==vid)return;
      const gColor=groups[v.groupId]?.color||'#FF7F6E';
      const gName=groups[v.groupId]?.name||'';
      const vDeadline=new Date(v.deadline);
      const vClosed=v.closed||vDeadline<=new Date();
      const _ov=_optimisticVotes[vid];
      const myVote=(_ov!==undefined)?(_ov===-1?null:_ov):(CU?.key&&v.responses?v.responses[CU.key]??null:null);
      const isOptimistic=_ov!==undefined&&_ov!==-1&&!(CU?.key&&v.responses&&v.responses[CU.key]!==undefined);
      const totalVoters=(v.responses?Object.keys(v.responses).length:0)+(isOptimistic?1:0);

      html+=`<div style="margin:0 12px 12px;background:rgba(255,248,245,0.8);border-radius:16px;border:1.5px solid ${gColor}33;overflow:hidden">`;
      html+=`<div style="padding:10px 14px 6px;font-size:12px;font-weight:800;color:${gColor}">${escH(gName)} 투표</div>`;

      (v.options||[]).forEach((opt,i)=>{
        let cnt=v.responses?Object.values(v.responses).filter(r=>r===i).length:0;
        if(isOptimistic&&myVote===i)cnt++;
        const pct=totalVoters>0?Math.round(cnt/totalVoters*100):0;
        const isSel=myVote===i;
        const canVote=!vClosed&&CU?.role==='member'&&myVote===null;
        html+=`<div class="vopt${isSel?' selected':''}${vClosed||myVote!==null?' closed':''}"
          style="margin:4px 10px;border-radius:12px;"
          ${canVote?`onclick="castVote('${vid}',${i})"`:''}>`;
        if(vClosed||myVote!==null)html+=`<div class="vbar" style="width:${pct}%;background:${gColor}18"></div>`;
        html+=`<div class="vopt-chk" style="${isSel?`background:${gColor};border-color:${gColor}`:''}">${isSel?'✓':''}</div>`;
        html+=`<div class="vopt-label">${escH(opt)}</div>`;
        if(vClosed||myVote!==null)html+=`<div class="vopt-cnt">${cnt}명</div>`;
        html+=`</div>`;
      });

      if(myVote!==null){
        const optName=(v.options||[])[myVote]||'';
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px 10px">`;

function renderVoteHTML(el,votes,links){
  let html='';
  const voteList=votes?Object.entries(votes)
    .filter(([k,v])=>!v.deleted&&v.groupId===activeGroup)
    .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)):[];

  if(voteList.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>투표가 없습니다</div>';
    return;
  }

  voteList.forEach(([vid,v])=>{
    const gColor=groups[v.groupId]?.color||'var(--accent)';
    const gName=groups[v.groupId]?.name||'';
    const deadline=new Date(v.deadline);
    const isClosed=v.closed||deadline<=new Date();
    // 낙관적 업데이트: _optimisticVotes 우선, 없으면 서버값
    const _ov=_optimisticVotes[vid];
    const myVote=(_ov!==undefined)?(_ov===-1?null:_ov):(CU?.key&&v.responses?v.responses[CU.key]??null:null);
    // 낙관적일 때 투표수 +1 보정
    const isOptimistic=_ov!==undefined&&_ov!==-1&&!(CU?.key&&v.responses&&v.responses[CU.key]!==undefined);
    const totalVoters=(v.responses?Object.keys(v.responses).length:0)+(isOptimistic?1:0);
    const diffH=Math.floor((deadline-new Date())/3600000);
    const ddStr=deadline.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

    html+=`<div class="vcard">`;
    html+=`<div class="vcard-head">`;
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">`;
    html+=`<span style="background:${gColor}22;color:${gColor};font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px">${escH(gName)}</span>`;
    if(isClosed)html+=`<span style="background:rgba(196,160,152,0.15);color:var(--text3);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">종료</span>`;
    html+=`</div>`;
    html+=`<div class="vcard-title">${escH(v.title)}</div>`;
    html+=`<div class="vcard-meta"><span class="vcard-deadline ${!isClosed&&diffH<2?'urgent':''}">⏰ ${ddStr} 마감</span><span>${totalVoters}명 참여</span></div>`;
    html+=`</div>`;

    html+=`<div class="vcard-opts">`;
    (v.options||[]).forEach((opt,i)=>{
      let cnt=v.responses?Object.values(v.responses).filter(r=>r===i).length:0;
      if(isOptimistic&&myVote===i)cnt++;
      const pct=totalVoters>0?Math.round(cnt/totalVoters*100):0;
      const isSel=myVote===i;
      const canVote=!isClosed&&CU?.role==='member'&&myVote===null;
      html+=`<div class="vopt${isSel?' selected':''}${isClosed||myVote!==null?' closed':''}" ${canVote?`onclick="castVote('${vid}',${i})"`:''}>`;
      if(isClosed||myVote!==null)html+=`<div class="vbar" style="width:${pct}%"></div>`;
      html+=`<div class="vopt-chk">${isSel?'✓':''}</div>`;
      html+=`<div class="vopt-label">${escH(opt)}</div>`;
      if(isClosed||myVote!==null)html+=`<div class="vopt-cnt">${cnt}명</div>`;

    if(myVote!==null){

      const myLink=links&&links[vid]?Object.values(links[vid]).find(l=>l.memberKey===CU.key):null;
      html+=`<div class="link-form">`;

        html+=`<div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:6px">✅ 링크 제출 완료</div>`;

      }else{
        html+=`<button class="btn-sm pri" onclick="openLinkModal('${vid}',false)" style="width:100%">📎 링크 제출하기</button>`;
      }
      html+=`</div>`;
    }

    // 관리자 액션
    if(CU?.role==='admin'){
      html+=`<div class="vadmin">`;
      html+=`<button class="vbtn edit" onclick="openVoteModal('${vid}')">✏️ 수정</button>`;
      html+=`<button class="vbtn copy" onclick="copyVote('${vid}')">📋 복사</button>`;
      html+=isClosed
        ?`<button class="vbtn open" onclick="toggleClose('${vid}',false)">🔓 재개</button>`
        :`<button class="vbtn close" onclick="toggleClose('${vid}',true)">🔒 마감</button>`;
      html+=`<button class="vbtn del" onclick="delVote('${vid}')">🗑 삭제</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  el.innerHTML=html;
}

// ── VOTE ACTIONS ──
// 낙관적 업데이트: 로컬에 즉시 반영하고 Firebase는 백그라운드로
let _optimisticVotes={}; // {vid: optIdx}

async function castVote(vid,optIdx){
  if(!CU?.key){showToast('로그인이 필요합니다');return;}

  // ① 즉시 UI 반영 (낙관적 업데이트)
  _optimisticVotes[vid]=optIdx;
  showToast('✅ 투표 완료!');
  renderVoteCards(); // 전체 reload 없이 카드만 빠르게 갱신

  // ② 백그라운드 검증 + 저장
  const v=await dbGet(`votes/${vid}`);
  if(!v||v.closed||new Date(v.deadline)<=new Date()){
    delete _optimisticVotes[vid];
    showToast('투표가 종료되었습니다');
    loadHome();
    return;
  }
  const gName=groups[v.groupId]?.name||'';
  const optName=(v.options||[])[optIdx]||'';

  // 병렬 저장
  Promise.all([
    dbSet(`votes/${vid}/responses/${CU.key}`,optIdx),
    dbSet(`calendar/${todayStr}/${CU.key}/${vid}`,{groupId:v.groupId,groupName:gName,option:optName,voteTitle:v.title,time:Date.now()})
  ]).then(()=>{
    // 오락실 연동 백그라운드
    const isStartVote=v.title.includes('시작')||v.title.includes('출근');
    if(isStartVote)syncWithGame(v.groupId,gName,optName);
    loadHome(); // 서버 확정 후 최종 반영
  });
}

async function resetVote(vid){
  if(!CU?.key)return;
  if(!confirm('투표를 수정하시겠습니까? 기존 선택이 취소됩니다.'))return;
  // 낙관적: 즉시 UI에서 제거
  _optimisticVotes[vid]=-1; // -1 = 취소 표시
  // 피드에서 접히지 않게 유지
  renderVoteCards();
  showToast('투표가 초기화됐어요. 다시 선택해주세요!');
  // 백그라운드 삭제
  Promise.all([
    dbDel(`votes/${vid}/responses/${CU.key}`),
    dbDel(`calendar/${todayStr}/${CU.key}/${vid}`)
  ]).then(()=>{
    delete _optimisticVotes[vid];
    loadHome();
  });
}

async function toggleClose(vid,close){
  await dbSet(`votes/${vid}/closed`,close);
  showToast(close?'🔒 마감됨':'🔓 재개됨');
  loadHome();loadVoteManageList();
}

async function delVote(vid){
  if(!confirm('삭제하시겠습니까?'))return;
  await dbSet(`votes/${vid}/deleted`,true);
  showToast('🗑️ 삭제됨');loadHome();loadVoteManageList();
}

// ── 오락실 연동 ──
async function syncWithGame(groupId,groupName,optionName){
  if(!CU?.key||!groupName||!optionName)return;
  // 연동할 옵션: 연차 → 연차 차감 / 그 외 경품명 → 경품 차감
  const isLeave=optionName.includes('연차');
  const isPrize=['투피드','출근확인증'].some(p=>optionName.includes(p))||(!isLeave&&optionName!=='출근'&&optionName!=='2인1조'&&optionName!=='재능기부'&&optionName!=='열정페이');

  if(!isLeave&&!isPrize)return;

  // crew31 멤버 이름으로 오락실 멤버 찾기 (그룹명+이름 or *그룹명+이름)
  const gameMembers=await gameGet('members');
  if(!gameMembers)return;
  const crewName=CU.name;
  const gameMember=Object.entries(gameMembers).find(([k,m])=>{
    const clean=m.name.replace(/^\*/,'').replace(/^(좋아요|댓글|시크릿)/,'');
    return clean===crewName&&(m.name.includes(groupName)||m.name.startsWith('*'+groupName));
  });
  if(!gameMember)return;
  const [gameKey,gm]=gameMember;
  const today=new Date().toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\.\s*/g,'.').slice(0,-1);

  if(isLeave){
    // 연차 차감 (수동 연차 먼저, 없으면 경품 연차)
    const manualLeave=await gameGet(`memberLeave/${gameKey}`)||0;
    const memberPrizes=await gameGet(`memberPrizes/${gameKey}`);
    const prizesArr=memberPrizes?Object.values(memberPrizes).filter(p=>p&&!p.deducted&&p.name==='연차'):[];

    if(manualLeave<=0&&prizesArr.length===0){showToast('⚠️ 오락실 연차 잔여 없음');return;}

    await gamePush(`leaveLog/${gameKey}`,{type:'deduct',amount:1,date:getKSTDate(),memo:'연차 사용 (crew31)'});

    if(manualLeave>0){
      await gameSet(`memberLeave/${gameKey}`,manualLeave-1);
    }else{
      // 경품 연차 차감
      if(!memberPrizes)return;
      const entries=Object.entries(memberPrizes);
      for(const [pk,p] of entries){
        if(p&&!p.deducted&&p.name==='연차'){
          await gameSet(`memberPrizes/${gameKey}/${pk}/deducted`,true);
          await gameSet(`memberPrizes/${gameKey}/${pk}/deductDate`,today);
          break;
        }
      }
    }
    showToast('🏖️ 오락실 연차 자동 차감됨!');
  } else {
    // 경품 차감 (옵션명과 일치하는 경품)
    const memberPrizes=await gameGet(`memberPrizes/${gameKey}`);
    if(!memberPrizes)return;
    const entries=Object.entries(memberPrizes);
    const target=entries.find(([pk,p])=>p&&!p.deducted&&optionName.includes(p.name));
    if(!target){showToast(`⚠️ 오락실 ${optionName} 경품 없음`);return;}
    const [pk]=target;
    await gameSet(`memberPrizes/${gameKey}/${pk}/deducted`,true);
    await gameSet(`memberPrizes/${gameKey}/${pk}/deductDate`,today);
    showToast(`🎁 오락실 ${optionName} 경품 자동 차감됨!`);
  }
}

// ── STATUS ──
async function loadStatus(){
  const el=document.getElementById('statusContent');

  const [votes,links,ms]=await Promise.all([dbGet('votes'),dbGet(`links`),dbGet('members')]);
  members=ms||{};

  let memberList=Object.entries(members).sort(([,a],[,b])=>a.name.localeCompare(b.name,'ko'));
  if(activeStatusGroup!=='all'){
    const gName=groups[activeStatusGroup]?.name||'';
    memberList=memberList.filter(([k,m])=>m.groups&&m.groups.includes(activeStatusGroup));
  }

  // 오늘 활성 투표
  const activeVotes=votes?Object.entries(votes)
    .filter(([k,v])=>!v.deleted&&!v.closed&&new Date(v.deadline)>new Date())
    .filter(([k,v])=>activeStatusGroup==='all'||v.groupId===activeStatusGroup)
    .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)):[];

    return (v&&v.groupId===activeStatusGroup)?sum+Object.keys(vl).length:sum;
  },0):0;

  html+=`<div class="card" style="margin-top:12px"><div class="stat-grid">`;
  html+=`<div class="stat-box"><div class="stat-box-label">전체 사원</div><div class="stat-box-val">${Object.keys(members).length}</div><div class="stat-box-sub">명</div></div>`;
  html+=`<div class="stat-box"><div class="stat-box-label">오늘 링크 제출</div><div class="stat-box-val" style="color:var(--green)">${linkCount}</div><div class="stat-box-sub">건</div></div>`;
  html+=`</div></div>`;

  // 진행 중인 투표별 현황
  activeVotes.forEach(([vid,v])=>{
    const gName=groups[v.groupId]?.name||'';
    const gColor=groups[v.groupId]?.color||'var(--accent)';
    const totalVoters=v.responses?Object.keys(v.responses).length:0;
    html+=`<div class="stitle">${escH(gName)} · ${escH(v.title)}</div>`;
    html+=`<div class="card">`;
    (v.options||[]).forEach((opt,i)=>{
      const cnt=v.responses?Object.values(v.responses).filter(r=>r===i).length:0;
      const pct=totalVoters>0?Math.round(cnt/totalVoters*100):0;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)">`;
      html+=`<div style="flex:1;font-size:13px;font-weight:600">${escH(opt)}</div>`;
      html+=`<div style="font-size:12px;color:var(--text2);width:80px">`;
      html+=`<div style="height:4px;background:var(--surface2);border-radius:2px;margin-bottom:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${gColor};border-radius:2px"></div></div>`;
      html+=`${cnt}명 (${pct}%)</div></div>`;
    });
    html+=`</div>`;

    // 링크 제출 현황
    const vLinks=links&&links[vid]?Object.values(links[vid]).sort((a,b)=>(a.time||0)-(b.time||0)):[];
    if(vLinks.length>0){
      html+=`<div class="stitle">📎 링크 제출 (${vLinks.length}건)</div><div class="card">`;
      vLinks.forEach((l,i)=>{
        html+=`<div class="stat-row">`;
        html+=`<div style="width:20px;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0">${i+1}</div>`;
        html+=`<div style="flex:1;min-width:0">`;
        html+=`<div style="font-size:13px;font-weight:700">${escH(l.nick||'')}${l.note?` <span style="font-size:11px;color:var(--text3)">(${escH(l.note)})</span>`:''}</div>`;
        html+=`<a href="${escH(l.url)}" target="_blank" style="font-size:11px;color:var(--blue);word-break:break-all">${escH(l.url)}</a>`;
        html+=`</div></div>`;
      });
      html+=`</div>`;
    }
  });

  if(!html.includes('stat-box'))html='<div class="empty"><div class="empty-icon">📊</div>현황 데이터 없음</div>';
  el.innerHTML=html;

// ── CALENDAR ──
async function renderCalendar(){
  document.getElementById('calTitle').textContent=`${calY}년 ${calM+1}월`;
  const prefix=`${calY}-${String(calM+1).padStart(2,'0')}`;
  const calData=await dbGet('calendar');
  const datesWithData=new Set();
  if(calData)Object.keys(calData).filter(d=>d.startsWith(prefix)).forEach(d=>datesWithData.add(d));
  const first=new Date(calY,calM,1).getDay();
  const last=new Date(calY,calM+1,0).getDate();
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++)html+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=last;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=[ds===todayStr?'today':ds===calSel?'selected':'',datesWithData.has(ds)?'has-data':'',new Date(calY,calM,d).getDay()===0?'sun':new Date(calY,calM,d).getDay()===6?'sat':''].filter(Boolean).join(' ');
    html+=`<div class="cal-day ${cls}" onclick="selectCalDay('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  showCalDetail(calSel);
}

function calMove(d){if(d<0){if(calM===0){calY--;calM=11;}else calM--;}else{if(calM===11){calY++;calM=0;}else calM++;}renderCalendar();}

async function showCalDetail(ds){
  const el=document.getElementById('calDetail');
  const [calData,links,votes,ms]=await Promise.all([dbGet(`calendar/${ds}`),dbGet('links'),dbGet('votes'),dbGet('members')]);
  if(ms)members=ms;

  if(CU?.role==='member'){
    if(!calData||!calData[CU.key]){el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>${ds} 참여 기록 없음</div>`;return;}
    const recs=Object.values(calData[CU.key]);
    let html=`<div class="stitle">${ds} 내 참여 기록</div><div class="card">`;
    recs.forEach(r=>{
      html+=`<div class="stat-row">`;
      html+=`<div style="flex:1;font-size:13px"><span style="font-weight:700;color:var(--accent)">${escH(r.groupName||'')}</span> · ${escH(r.voteTitle||'')}</div>`;
      html+=`<div class="badge ${getBadge(r.option)}">${escH(r.option||'-')}</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;

    // 내 링크 제출 기록
    if(votes&&links){
      const myLinks=[];
      Object.entries(links).forEach(([vid,vl])=>{
        if(vl&&vl[CU.key]){
          const v=votes[vid];
          const gName=groups[v?.groupId]?.name||'';
          myLinks.push({gName,link:vl[CU.key],vTitle:v?.title||''});
        }
      });
      if(myLinks.length>0){
        html+=`<div class="stitle">📎 내 링크 제출</div><div class="card">`;
        myLinks.forEach(({gName,link,vTitle})=>{
          html+=`<div style="padding:10px 16px;border-bottom:1px solid var(--border)">`;
          html+=`<div style="font-size:12px;color:var(--text2);margin-bottom:3px">${escH(gName)} · ${escH(vTitle)}</div>`;
          html+=`<a href="${escH(link.url)}" target="_blank" style="font-size:12px;color:var(--blue)">${escH(link.url)}</a>`;
          html+=`</div>`;
        });
        html+=`</div>`;
      }
    }
    el.innerHTML=html;
  }else{
    if(!calData){el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>${ds} 기록 없음</div>`;return;}
    const byGroup={};
    Object.entries(calData).forEach(([mKey,vs])=>{
      const mName=members[mKey]?.name||mKey;
      Object.values(vs).forEach(r=>{
        if(!byGroup[r.groupId])byGroup[r.groupId]={name:r.groupName,members:[]};
        if(!byGroup[r.groupId].members.find(m=>m.key===mKey))
          byGroup[r.groupId].members.push({key:mKey,name:mName,option:r.option});
      });
    });
    let html=`<div class="stitle">${ds} 참여 현황</div>`;
    Object.entries(byGroup).forEach(([gid,g])=>{
      const gColor=groups[gid]?.color||'var(--accent)';
      html+=`<div class="card"><div style="padding:10px 16px;font-weight:800;font-size:14px;color:${gColor}">${escH(g.name)} (${g.members.length}명)</div>`;
      g.members.forEach(m=>{
        html+=`<div class="stat-row"><div class="stat-name">${escH(m.name)}</div><div class="badge ${getBadge(m.option)}">${escH(m.option||'-')}</div></div>`;
      });
      html+=`</div>`;
    });
    el.innerHTML=html;
  }
}

function getBadge(opt){
  if(!opt)return'n';
  if(opt.includes('출근'))return'g';
  if(opt.includes('연차'))return'y';
  if(opt.includes('2인'))return'b';
  if(opt.includes('투피드'))return'r';
  return'n';
}

function cleanInstagramUrl(url){
  // reel → p 변환
  url=url.replace(/instagram\.com\/reel\//g,'instagram.com/p/');
  // ? 이후 삭제 (/ 뒤의 ? 포함)
  url=url.replace(/\?.*/,'');
  // 끝 슬래시 정리
  if(!url.endsWith('/'))url+='/';
  return url.trim();
}

async function loadLeave(){
  const el=document.getElementById('leaveContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';

  // crew31 닉네임으로 오락실에서 해당 계정 찾기
  const crewName=CU?.role==='admin'?null:CU?.name;
  const [gameMembers,allMemberPrizes,allMemberLeave,allLeaveLog]=await Promise.all([
    gameGet('members'),gameGet('memberPrizes'),gameGet('memberLeave'),gameGet('leaveLog')
  ]);
  if(!gameMembers){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>오락실 연결 실패</div>';return;}

  // 매칭: 관리자면 전체, 사원이면 본인 닉네임 포함 계정
  const GAME_GROUPS=['좋아요','댓글','시크릿'];
  let targetAccounts=[];
  if(CU?.role==='admin'){
    // 인사팀: 좋아요/댓글/시크릿 그룹별로 묶기
    targetAccounts=Object.entries(gameMembers).map(([k,m])=>({key:k,name:m.name}));
  }else{
    // 사원: 본인 닉네임 포함된 계정들 (좋아요불주먹, 댓글불주먹, 시크릿불주먹)
    targetAccounts=Object.entries(gameMembers)
      .filter(([k,m])=>m.name.replace(/^\*/,'').replace(/^(좋아요|댓글|시크릿)/,'')===crewName)
      .map(([k,m])=>({key:k,name:m.name}));
    if(targetAccounts.length===0){
      // 직접 이름 매칭도 시도
      targetAccounts=Object.entries(gameMembers)
        .filter(([k,m])=>m.name===crewName||m.name.includes(crewName))
        .map(([k,m])=>({key:k,name:m.name}));
    }
  }

  if(targetAccounts.length===0){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>오락실 계정을 찾을 수 없습니다</div>';return;}

  // 그룹별로 묶기
  const byGroup={};
  GAME_GROUPS.forEach(g=>byGroup[g]=[]);
  byGroup['기타']=[];
  targetAccounts.forEach(acc=>{
    const clean=acc.name.replace(/^\*/,'');
    const g=GAME_GROUPS.find(g=>clean.startsWith(g))||'기타';
    byGroup[g].push(acc);
  });

  let html='';
  const allGroups=CU?.role==='admin'?[...GAME_GROUPS,'기타']:GAME_GROUPS;

  // 검색창 (인사팀만)
  if(CU?.role==='admin'){
    html+=`<div style="padding:8px 16px 4px">
      <input id="leaveSearch" oninput="filterLeave()" placeholder="🔍 이름 검색..."
        style="width:100%;padding:10px 14px;background:white;border:1.5px solid var(--border);border-radius:12px;font-size:14px;outline:none;box-sizing:border-box">
    </div>`;
  }
  html+='<div id="leaveList">';

  for(const gName of allGroups){
    const accs=byGroup[gName];
    if(!accs||accs.length===0)continue;
    const gColor={'좋아요':'#6C35DE','댓글':'#FF6B9D','시크릿':'#00C9A7','기타':'#F7B731'}[gName]||'#888';

    // 인사팀: 그룹 헤더 + 그룹 전체 드롭다운
    if(CU?.role==='admin'){
      const grpId='grp_'+gName;
      html+=`<div data-group="${gName}" style="margin:10px 16px 4px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="toggleLeaveAcc('${grpId}')">`;
      html+=`<div style="width:10px;height:10px;border-radius:50%;background:${gColor};flex-shrink:0"></div>`;
      html+=`<div style="font-size:15px;font-weight:900;color:${gColor}">${gName} <span style="font-size:12px;font-weight:600;color:var(--text3)">(${accs.length}명)</span></div>`;
      html+=`<span id="arr_${grpId}" style="color:${gColor};font-size:13px;margin-left:auto">▼</span></div>`;
      html+=`<div id="${grpId}" style="display:none">`;
    }

    for(const acc of accs){
      const prizes=allMemberPrizes&&allMemberPrizes[acc.key]?Object.entries(allMemberPrizes[acc.key]):[];
      const manualLeave=(allMemberLeave&&allMemberLeave[acc.key])||0;
      const leaveLog=allLeaveLog&&allLeaveLog[acc.key]?Object.values(allLeaveLog[acc.key]).sort((a,b)=>{const dd=(b.date||'').localeCompare(a.date||'');return dd!==0?dd:(b.time||0)-(a.time||0);}):[];
      const prizeLeave=prizes.filter(([k,p])=>p&&!p.deducted&&p.name==='연차').length;
      const totalLeave=manualLeave+prizeLeave;

      const accId='acc_'+acc.key;
      html+=`<div class="card" data-name="${escH(acc.name)}" style="margin-top:0">`;
      html+=`<div onclick="toggleLeaveAcc('${accId}')" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;">`;
      html+=`<div style="display:flex;align-items:center;gap:10px">`;
      html+=`<div style="width:28px;height:28px;border-radius:50%;background:${gColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white">${gName.charAt(0)}</div>`;
      const tfCount=prizes.filter(([k,p])=>p&&!p.deducted&&p.name==='투피드').length;
      const subParts=[];
      subParts.push('연차 잔여 '+totalLeave+'일');
      if(tfCount>0)subParts.push('🍔 투피드 '+tfCount+'개');
      html+=`<div><div style="font-size:14px;font-weight:800">${escH(acc.name)}</div>`;
      html+=`<div style="font-size:11px;color:var(--text3)">${subParts.join(' · ')}</div></div></div>`;
      html+=`<span style="color:var(--accent);font-size:16px" id="arr_${accId}">▼</span>`;
      html+=`</div>`;

      html+=`<div id="${accId}" style="display:none;border-top:1px solid var(--border)">`;

      // 연차 내역
      html+=`<div style="padding:10px 16px 4px;font-size:12px;font-weight:800;color:var(--accent)">🏖️ 연차 내역</div>`;
      if(leaveLog.length>0){
        leaveLog.forEach(l=>{
          html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:1px solid var(--border)">`;
          html+=`<div><span style="color:${l.type==='deduct'?'var(--red)':'var(--green)'}; font-weight:700">${l.type==='deduct'?'-':'+'}${l.amount}일 ${l.type==='deduct'?'차감':'지급'}</span>`;
          if(l.memo)html+=` <span style="font-size:11px;color:var(--gold)">📝 ${escH(l.memo)}</span>`;
          html+=`</div><span style="font-size:11px;color:var(--text3)">${l.date||''}</span></div>`;
        });
      }else{
        html+=`<div style="padding:8px 16px;font-size:13px;color:var(--text3)">내역 없음</div>`;
      }

      // 경품 연차
      const prizeLeaveItems=prizes.filter(([k,p])=>p&&p.name==='연차');
      if(prizeLeaveItems.length>0){
        html+=`<div style="padding:10px 16px 4px;font-size:12px;font-weight:800;color:var(--accent)">🎰 경품 연차</div>`;
        prizeLeaveItems.forEach(([k,p])=>{
          const isDeducted=!!p.deducted;
          html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:1px solid var(--border);${isDeducted?'opacity:0.5':''}">`;
          html+=`<div style="font-size:13px;${isDeducted?'text-decoration:line-through;color:var(--text3)':''}">🏖️ 연차${isDeducted?' (차감됨)':''}</div>`;
          html+=`<div style="font-size:11px;color:var(--text3)">`;
          if(p.time)html+=`지급 ${new Date(p.time).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','/')}`;
          if(isDeducted&&p.deductDate)html+=` · <span style="color:var(--red)">차감 ${p.deductDate}</span>`;
          html+=`</div></div>`;
        });
      }

      // 투피드 경품
      const tfItems=prizes.filter(([k,p])=>p&&p.name==='투피드');
      if(tfItems.length>0){
        html+=`<div style="padding:10px 16px 4px;font-size:12px;font-weight:800;color:var(--accent)">🍔 투피드</div>`;
        tfItems.forEach(([k,p])=>{
          const isDeducted=!!p.deducted;
          html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:1px solid var(--border);${isDeducted?'opacity:0.5':''}">`;
          html+=`<div style="font-size:13px;${isDeducted?'text-decoration:line-through;color:var(--text3)':''}">🍔 투피드${isDeducted?' (차감됨)':''}</div>`;
          html+=`<div style="font-size:11px;color:var(--text3)">`;
          if(p.time)html+=`지급 ${new Date(p.time).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','/')}`;
          if(p.memo)html+=` · <span style="color:var(--gold)">만료 ${escH(p.memo)}</span>`;
          if(isDeducted&&p.deductDate)html+=` · <span style="color:var(--red)">차감 ${p.deductDate}</span>`;
          html+=`</div></div>`;
        });
      }

      // 인사팀: 적립/차감/메모 UI
      if(CU?.role==='admin'){
        html+=`<div style="padding:10px 16px 14px;border-top:1px solid var(--border)">`;
        html+=`<div style="font-size:12px;font-weight:800;color:var(--accent);margin-bottom:8px">✏️ 연차 수동 처리</div>`;
        html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
        html+=`<input id="leaveAmt_${acc.key}" type="number" min="1" placeholder="일수" style="width:70px;padding:8px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;text-align:center">`;
        html+=`<input id="leaveMemo_${acc.key}" placeholder="📝 메모" style="flex:1;padding:8px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none">`;
        html+=`</div>`;
        html+=`<div style="display:flex;gap:6px">`;
        html+=`<button onclick="adminLeaveAdjust('${acc.key}',1)" style="flex:1;padding:9px;background:rgba(93,184,138,0.15);border:none;border-radius:10px;font-size:13px;font-weight:800;color:var(--green)">+ 적립</button>`;
        html+=`<button onclick="adminLeaveAdjust('${acc.key}',-1)" style="flex:1;padding:9px;background:rgba(255,92,92,0.1);border:none;border-radius:10px;font-size:13px;font-weight:800;color:var(--red)">− 차감</button>`;
        html+=`</div></div>`;
      }

      html+=`</div></div>`;
    }
    if(CU?.role==='admin')html+=`</div>`; // 그룹 컨테이너 닫기
  }
  html+='</div>'; // leaveList 닫기

  el.innerHTML=html||'<div class="empty"><div class="empty-icon">📭</div>데이터 없음</div>';
}

async function adminLeaveAdjust(gameKey, sign){
  const amtEl=document.getElementById('leaveAmt_'+gameKey);
  const memoEl=document.getElementById('leaveMemo_'+gameKey);
  const amount=parseInt(amtEl?.value);
  const memo=memoEl?.value.trim()||'';
  if(!amount||amount<1){showToast('일수를 입력하세요');return;}

  const today=getKSTDate();

  if(sign>0){
    // 적립
    await gamePush(`leaveLog/${gameKey}`,{type:'give',amount,date:today,memo,time:Date.now()});
    const cur=await gameGet(`memberLeave/${gameKey}`)||0;
    await gameSet(`memberLeave/${gameKey}`,cur+amount);
    showToast(`✅ +${amount}일 적립 완료!`);
  }else{
    // 차감
    const cur=await gameGet(`memberLeave/${gameKey}`)||0;
    // 수동 연차 먼저, 없으면 경품 연차
    const memberPrizes=await gameGet(`memberPrizes/${gameKey}`);
    const prizeLeave=memberPrizes?Object.values(memberPrizes).filter(p=>p&&!p.deducted&&p.name==='연차').length:0;
    if(cur+prizeLeave<amount){showToast('연차 잔여가 부족합니다');return;}
    await gamePush(`leaveLog/${gameKey}`,{type:'deduct',amount,date:today,memo,time:Date.now()});
    let remaining=amount;
    if(cur>0){
      const fromManual=Math.min(cur,remaining);
      await gameSet(`memberLeave/${gameKey}`,cur-fromManual);
      remaining-=fromManual;
    }
    if(remaining>0&&memberPrizes){
      const today2=new Date().toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\.\s*/g,'.').slice(0,-1);
      const entries=Object.entries(memberPrizes);
      for(const [pk,p] of entries){
        if(remaining<=0)break;
        if(p&&!p.deducted&&p.name==='연차'){
          await gameSet(`memberPrizes/${gameKey}/${pk}/deducted`,true);
          await gameSet(`memberPrizes/${gameKey}/${pk}/deductDate`,today2);
          remaining--;
        }
      }
    }
    showToast(`✅ -${amount}일 차감 완료!`);
  }

  if(amtEl)amtEl.value='';
  if(memoEl)memoEl.value='';
  loadLeave(); // 새로고침
}

function filterLeave(){
  const q=(document.getElementById('leaveSearch')?.value||'').toLowerCase();
  const list=document.getElementById('leaveList');if(!list)return;
  // 카드들 필터링
  list.querySelectorAll('.card').forEach(card=>{
    const name=card.querySelector('[data-name]')?.dataset.name||card.textContent;
    card.style.display=(!q||name.toLowerCase().includes(q))?'':'none';
  });
  // 그룹 헤더도 처리
  list.querySelectorAll('[data-group]').forEach(hdr=>{
    const gName=hdr.dataset.group;
    const grpEl=document.getElementById('grp_'+gName);
    if(q&&grpEl){grpEl.style.display='block';document.getElementById('arr_grp_'+gName).textContent='▲';}
  });
}

function toggleLeaveAcc(id){
  const el=document.getElementById(id);
  const arr=document.getElementById('arr_'+id);
  if(!el)return;
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(arr)arr.textContent=isOpen?'▼':'▲';
}

// ── 공지 드롭다운 ──
let _noticeEditMode=false;

async function openNoticeDetailById(nid){
  const n=await dbGet(`notices/${nid}`);
  if(!n)return;
  openNoticeDetail(nid,n.title,n.body||'',n.createdAt,n);
}

function openNoticeDetail(nid,title,body,createdAt,noticeObj){
  document.getElementById('noticeDetailId').value=nid;
  document.getElementById('noticeDetailTitle').textContent=title;
  document.getElementById('noticeDetailBody').textContent=body||'';
  document.getElementById('noticeDetailMeta').textContent=fmtDate(createdAt);
  document.getElementById('noticeEditArea').style.display='none';
  document.getElementById('noticeDetailBody').style.display='';
  document.getElementById('noticeEditBtn').style.display='';
  document.getElementById('noticeSaveBtn').style.display='none';
  _noticeEditMode=false;
  const isAdmin=CU?.role==='admin';
  document.getElementById('noticeAdminBtns').style.display=isAdmin?'block':'none';
  document.getElementById('noticeMemberArea').style.display=isAdmin?'none':'block';
  // 메인/전체 이동 버튼 텍스트
  if(isAdmin){
    const isMain=(noticeObj?.type==='main');
    const moveBtn=document.getElementById('noticeMoveBtn');
    if(moveBtn)moveBtn.textContent=isMain?'📋 전체공지로 이동':'📌 메인공지로 올리기';
  }
  if(!isAdmin)loadNoticeComments(nid);
  document.getElementById('noticeDetailOverlay').classList.add('active');
}

async function loadNoticeComments(nid){
  const el=document.getElementById('noticeCommentList');if(!el)return;
  const comments=await dbGet(`noticeComments/${nid}`);
  if(!comments||Object.keys(comments).length===0){el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 0">댓글이 없습니다</div>';return;}
  const list=Object.values(comments).sort((a,b)=>(a.time||0)-(b.time||0));
  el.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">💬 댓글</div>'+list.map(c=>`
    <div style="padding:6px 10px;background:var(--surface2);border-radius:10px;margin-bottom:4px">
      <div style="font-size:12px;font-weight:700;color:var(--accent)">${escH(c.name||'')}</div>
      <div style="font-size:13px;color:var(--text)">${escH(c.body||'')}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${fmtDate(c.time)}</div>
    </div>`).join('');
}

async function submitNoticeComment(){
  const nid=document.getElementById('noticeDetailId').value;
  const body=document.getElementById('noticeCommentInput').value.trim();
  if(!body){showToast('댓글을 입력하세요');return;}
  await dbPush(`noticeComments/${nid}`,{name:CU.name,body,time:Date.now()});
  document.getElementById('noticeCommentInput').value='';
  showToast('💬 댓글 등록됨');
  loadNoticeComments(nid);
}
function closeNoticeDetail(){document.getElementById('noticeDetailOverlay').classList.remove('active');}

function toggleNoticeEdit(){
  _noticeEditMode=!_noticeEditMode;
  const nid=document.getElementById('noticeDetailId').value;
  if(_noticeEditMode){
    document.getElementById('noticeEditTitle').value=document.getElementById('noticeDetailTitle').textContent;
    document.getElementById('noticeEditBody').value=document.getElementById('noticeDetailBody').textContent;
    document.getElementById('noticeEditArea').style.display='block';
    document.getElementById('noticeDetailBody').style.display='none';
    document.getElementById('noticeEditBtn').style.display='none';
    document.getElementById('noticeSaveBtn').style.display='';
  }else{
    document.getElementById('noticeEditArea').style.display='none';
    document.getElementById('noticeDetailBody').style.display='';
    document.getElementById('noticeEditBtn').style.display='';
    document.getElementById('noticeSaveBtn').style.display='none';
  }
}

async function saveNoticeEdit(){
  const nid=document.getElementById('noticeDetailId').value;
  const title=document.getElementById('noticeEditTitle').value.trim();
  const body=document.getElementById('noticeEditBody').value.trim();
  if(!title){showToast('제목을 입력하세요');return;}
  await Promise.all([dbSet(`notices/${nid}/title`,title),dbSet(`notices/${nid}/body`,body)]);
  document.getElementById('noticeDetailTitle').textContent=title;
  document.getElementById('noticeDetailBody').textContent=body;
  toggleNoticeEdit();
  showToast('✅ 수정됨');loadNoticePage();
}

async function delNoticeFromDetail(){
  const nid=document.getElementById('noticeDetailId').value;
  if(!confirm('삭제하시겠습니까?'))return;
  await dbSet(`notices/${nid}/deleted`,true);
  closeNoticeDetail();showToast('🗑️ 삭제됨');loadNoticePage();
}


// ── 그룹 잠금 ──
let _lockAction=null; // 'lock' or 'unlock' or 'enter'

function openGroupLockModal(groupId,action){
  _lockAction=action;
  document.getElementById('lockTargetGroupId').value=groupId;
  document.getElementById('lockPwInput').value='';
  const g=groups[groupId];
  const gName=g?.name||'그룹';
  const isAdmin=CU?.role==='admin';
  // 인사팀: 무제한 비번 / 사원: 4자리
  const pwInput=document.getElementById('lockPwInput');
  const pwLabel=document.getElementById('lockPwLabel');
  if(isAdmin){
    pwInput.maxLength=50;pwInput.inputMode='text';
    pwLabel.textContent='비밀번호 (자유 입력)';
  }else{
    pwInput.maxLength=4;pwInput.inputMode='numeric';
    pwLabel.textContent='4자리 비밀번호';
  }
  if(action==='lock'){
    document.getElementById('lockModalTitle').textContent='🔒 잠금 설정';
    document.getElementById('lockModalDesc').textContent=`${gName} 탭에 사용할 비밀번호를 입력하세요`;
  }else if(action==='unlock'){
    document.getElementById('lockModalTitle').textContent='🔓 잠금 해제';
    document.getElementById('lockModalDesc').textContent=`현재 비밀번호를 입력하세요`;
  }else{
    document.getElementById('lockModalTitle').textContent=`🔒 ${gName}`;
    document.getElementById('lockModalDesc').textContent='비밀번호를 입력하세요';
  }
  document.getElementById('groupLockModal').classList.add('active');
  setTimeout(()=>document.getElementById('lockPwInput').focus(),300);
}
function closeGroupLockModal(){document.getElementById('groupLockModal').classList.remove('active');}

async function confirmGroupLock(){
  const gid=document.getElementById('lockTargetGroupId').value;
  const pw=document.getElementById('lockPwInput').value;
  const isAdmin=CU?.role==='admin';
  // 사원: 4자리 숫자만, 인사팀: 무제한
  if(!isAdmin&&(pw.length!==4||!/^\d{4}$/.test(pw))){showToast('4자리 숫자를 입력하세요');return;}
  if(!pw){showToast('비밀번호를 입력하세요');return;}
  const g=await dbGet(`groups/${gid}`);

  if(_lockAction==='lock'){
    await dbSet(`groups/${gid}/lock`,pw);
    closeGroupLockModal();showToast('🔒 잠금 설정 완료');await loadGroups();loadSettings();
  }else if(_lockAction==='unlock'){
    if(g?.lock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    await dbSet(`groups/${gid}/lock`,'');
    closeGroupLockModal();showToast('🔓 잠금 해제됨');await loadGroups();loadSettings();
  }else{
    // enter: 비번 맞으면 해당 그룹 탭 열기
    if(g?.lock!==pw){showToast('비밀번호가 틀렸습니다');document.getElementById('lockPwInput').value='';return;}
    sessionStorage.setItem('unlockedGroup_'+gid,'1');
    closeGroupLockModal();
    // 피드 모드: 대기 중인 vid가 있으면 펼치기
    if(_pendingFeedVid){
      _expandedFeedGroup=_pendingFeedVid;
      _pendingFeedVid=null;
      renderVoteCards();
    }else{
      const btn=document.querySelector(`#homeGroupTabs .gtab[data-gid="${gid}"]`);
      if(btn)setHomeGroup(gid,btn);
    }
  }
}

function checkGroupLock(gid,btn){
  if(CU?.role==='admin'){setHomeGroup(gid,btn);return;}
  const g=groups[gid];
  if(!g?.lock){setHomeGroup(gid,btn);return;}
  // 이미 이 세션에서 해제됐으면 바로 접근
  if(sessionStorage.getItem('unlockedGroup_'+gid)==='1'){setHomeGroup(gid,btn);return;}
  // 잠금 모달 열기
  openGroupLockModal(gid,'enter');
}
// ── UTILS ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
